<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Task Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f4f8;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        .task-form {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #34495e;
        }
        input, select, button {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }
        button {
            background-color: #3498db;
            color: white;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        button:hover {
            background-color: #2980b9;
        }
        #taskList {
            list-style: none;
            padding: 0;
        }
        .task-item {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            gap: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Student Task Manager</h1>
        <p class="subtitle">Stay organized with your tasks</p>
        
        <div class="task-form">
            <h2>Add New Task</h2>
            
            <div class="form-group">
                <label>Task Title</label>
                <input type="text" id="taskTitle" placeholder="Enter task title">
            </div>
            
            <div class="form-group">
                <label>Due Date</label>
                <input type="date" id="taskDate">
            </div>
            
            <div class="form-group">
                <label>Priority</label>
                <select id="taskPriority">
                    <option value="Low">Low</option>
                    <option value="Medium" selected>Medium</option>
                    <option value="High">High</option>
                </select>
            </div>
            
            <button onclick="addTask()">+ Add Task</button>
        </div>

        <h2>Your Tasks</h2>
        <ul id="taskList"></ul>
    </div>

    <script>
        function addTask() {
            const title = document.getElementById('taskTitle').value;
            if (title.trim() === "") {
                alert("Please enter a task title!");
                return;
            }
            alert(`✅ Task Added: "${title}"\n\n(Full functionality coming in JavaScript Phase)`);
            
            // Clear input after adding
            document.getElementById('taskTitle').value = "";
        }
    </script>
</body>
</html>
